<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Agrinho 2026</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!--BOTAO PARA MUDAR A COR DO SITE PARA ESCURO-->
    <div style="text-align: right;">
        <button id="botao-escuro">Mudar Fundo</button>
    </div>

    <div class="bloco">
        <!--TITULO PRINCIPAL-->
        <h2>Como a comida chega até sua casa?</h2>
        <p>Veja os exemplos abaixo:</p>
        
        <!--ARROZ-->
        <div class="item-alimento">
            <h3>Arroz</h3>
            <button class="botao-ver" data-nome="Arroz">Ver mais</button>
        </div>

        <!--MILHO-->
        <div class="item-alimento">
            <h3>Milho</h3>
            <button class="botao-ver" data-nome="Milho">Ver mais</button>
        </div>

        <!--CHOCOLATE-->
        <div class="item-alimento">
            <h3>Chocolate</h3>
            <button class="botao-ver" data-nome="Chocolate">Ver mais</button>
        </div>

        <!--Área escondida que será exibida via JavaScript com os detalhes do alimento clicado-->
        <div id="bloco-resposta" class="escondido">
            <h4 id="titulo-resposta"></h4>
            <p id="texto-resposta"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
